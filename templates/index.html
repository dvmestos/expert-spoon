<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Instagram Username Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #ff006e;
            --accent: #ffbe0b;
            --dark: #0a0e27;
            --darker: #050811;
            --light: #f8f9fa;
            --success: #00ff88;
            --error: #ff3333;
            --warning: #ffa500;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Sora', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 212, 255, 0.05) 25%, rgba(0, 212, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 212, 255, 0.05) 75%, rgba(0, 212, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 212, 255, 0.05) 25%, rgba(0, 212, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 212, 255, 0.05) 75%, rgba(0, 212, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        body > * {
            position: relative;
            z-index: 2;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            letter-spacing: -1px;
        }

        h1 { font-size: 3.5rem; text-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }
        h2 { font-size: 1.8rem; }
        h3 { font-size: 1.3rem; }

        /* Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 2rem;
            min-height: 100vh;
        }

        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Card styling */
        .card {
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        .card-header h2 {
            margin: 0;
        }

        /* Buttons */
        button, .btn {
            padding: 0.7rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 0, 110, 0.2);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .btn-secondary:hover {
            background: rgba(255, 0, 110, 0.3);
        }

        .btn-danger {
            background: rgba(255, 51, 51, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .btn-danger:hover {
            background: rgba(255, 51, 51, 0.3);
        }

        .btn-success {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-success:hover {
            background: rgba(0, 255, 136, 0.3);
        }

        .btn-sm {
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 212, 255, 0.05);
            color: var(--light);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        input::placeholder {
            color: rgba(248, 249, 250, 0.4);
        }

        /* Account list */
        .account-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .account-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--primary);
        }

        .account-info {
            flex: 1;
        }

        .account-username {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        .account-status {
            font-size: 0.85rem;
            color: rgba(248, 249, 250, 0.6);
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-online {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .status-offline {
            background: rgba(255, 51, 51, 0.2);
            color: var(--error);
        }

        /* Checker section */
        .checker-input {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .checker-input input {
            flex: 1;
        }

        .username-list {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.2rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', monospace;
            font-size: 0.9rem;
        }

        .username-item {
            color: var(--primary);
            padding: 0.4rem;
            word-break: break-all;
        }

        .username-item:nth-child(odd) {
            background: rgba(0, 212, 255, 0.02);
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* Results */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 800px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 8px;
            padding: 1.2rem;
            text-align: center;
        }

        .result-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .result-available {
            color: var(--success);
        }

        .result-taken {
            color: var(--error);
        }

        .result-errors {
            color: var(--warning);
        }

        .result-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(248, 249, 250, 0.6);
        }

        /* Hits list */
        .hits-item {
            background: rgba(0, 255, 136, 0.05);
            border-left: 3px solid var(--success);
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 4px;
        }

        .hits-username {
            font-family: 'Monaco', monospace;
            color: var(--success);
            font-weight: 600;
        }

        .hits-time {
            font-size: 0.75rem;
            color: rgba(248, 249, 250, 0.4);
        }

        /* Tabs */
        .tab-container {
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0;
        }

        .tab-btn {
            padding: 1rem;
            border: none;
            background: transparent;
            color: rgba(248, 249, 250, 0.6);
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Icons */
        .icon {
            display: inline-block;
            margin-right: 0.5rem;
        }

        /* Utilities */
        .text-center { text-align: center; }
        .mt-1 { margin-top: 1rem; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulsing {
            animation: pulse 2s infinite;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 8, 17, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
            animation: slideUp 0.3s ease-out;
        }

        .modal-close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        .modal-close:hover {
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel: Accounts -->
        <div class="card">
            <div class="card-header">
                <h2><span class="icon">📱</span>Accounts</h2>
                <button class="btn btn-primary btn-sm" onclick="openAddAccountModal()">+ Add</button>
            </div>
            
            <div id="accountsList"></div>
            
            <div class="mt-2">
                <button class="btn btn-secondary btn-sm" style="width: 100%;" onclick="showLoginAll()">
                    Login All
                </button>
            </div>
        </div>

        <!-- Center Panel: Checker -->
        <div class="card">
            <div class="card-header">
                <h2><span class="icon">🔍</span>Username Checker</h2>
                <button class="btn btn-secondary btn-sm" onclick="openSettingsModal()">⚙️ Settings</button>
            </div>

            <!-- Generator Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('tab-manual')">Manual</button>
                <button class="tab-btn" onclick="switchTab('tab-random')">Random</button>
                <button class="tab-btn" onclick="switchTab('tab-pattern')">Pattern</button>
                <button class="tab-btn" onclick="switchTab('tab-wordlist')">Wordlist</button>
            </div>

            <!-- Manual Input -->
            <div id="tab-manual" class="tab-content active">
                <div class="form-group">
                    <label>Enter Usernames (one per line)</label>
                    <textarea id="manualUsernames" placeholder="username1&#10;username2&#10;username3" rows="6"></textarea>
                </div>
            </div>

            <!-- Random Generator -->
            <div id="tab-random" class="tab-content">
                <div class="form-group">
                    <label>Count</label>
                    <input type="number" id="randomCount" value="10" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Max Length</label>
                    <input type="number" id="randomMaxLength" value="5" min="1" max="10">
                </div>
                <button class="btn btn-primary" onclick="generateRandom()">Generate Random</button>
            </div>

            <!-- Pattern Generator -->
            <div id="tab-pattern" class="tab-content">
                <div class="form-group">
                    <label>Base Username</label>
                    <input type="text" id="patternBase" placeholder="e.g., cool">
                </div>
                <div class="form-group">
                    <label>Count</label>
                    <input type="number" id="patternCount" value="10" min="1" max="100">
                </div>
                <button class="btn btn-primary" onclick="generatePattern()">Generate Pattern</button>
            </div>

            <!-- Wordlist -->
            <div id="tab-wordlist" class="tab-content">
                <div class="form-group">
                    <label>File Path</label>
                    <input type="text" id="wordlistPath" placeholder="wordlist.txt">
                </div>
                <button class="btn btn-primary" onclick="loadWordlist()">Load Wordlist</button>
            </div>

            <!-- Generated Usernames Display -->
            <div id="usernameListContainer" style="display: none;">
                <div class="username-list" id="usernameList"></div>
                <div style="text-align: center; margin-bottom: 1.2rem;">
                    <small id="usernameCount"></small>
                </div>
            </div>

            <!-- Checker Controls -->
            <div class="form-group">
                <label>Select Accounts</label>
                <div id="accountsCheckboxes"></div>
            </div>

            <button class="btn btn-primary" onclick="startChecking()" id="startBtn" style="width: 100%; margin-bottom: 1rem;">
                Start Checking
            </button>

            <!-- Progress -->
            <div id="progressContainer" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div style="text-align: center; color: rgba(248, 249, 250, 0.6);">
                    <span id="progressText">0%</span> • 
                    <span id="currentIndex">0</span>/<span id="totalCount">0</span>
                </div>
                <button class="btn btn-danger" onclick="stopChecking()" style="width: 100%; margin-top: 1rem;">
                    Stop
                </button>
            </div>

            <!-- Results -->
            <div id="resultsContainer" style="display: none; margin-top: 1.5rem;">
                <h3 style="margin-bottom: 1rem;">Results</h3>
                <div class="results-grid">
                    <div class="result-card">
                        <div class="result-number result-available" id="resultAvailable">0</div>
                        <div class="result-label">Available</div>
                    </div>
                    <div class="result-card">
                        <div class="result-number result-taken" id="resultTaken">0</div>
                        <div class="result-label">Taken</div>
                    </div>
                    <div class="result-card">
                        <div class="result-number result-errors" id="resultErrors">0</div>
                        <div class="result-label">Errors</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Hits -->
        <div class="card">
            <div class="card-header">
                <h2><span class="icon">✅</span>Hits</h2>
                <button class="btn btn-primary btn-sm" onclick="exportHits()">Export</button>
            </div>

            <div id="hitsList" style="max-height: 600px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="addAccountModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAddAccountModal()">&times;</span>
            <h3 style="margin-bottom: 1.5rem;">Add Instagram Account</h3>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="accountUsername" placeholder="username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="accountPassword" placeholder="password">
            </div>
            
            <button class="btn btn-primary" onclick="addAccount()" style="width: 100%;">Add Account</button>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeSettingsModal()">&times;</span>
            <h3 style="margin-bottom: 1.5rem;">Settings</h3>
            
            <div class="form-group">
                <label>Check Delay (seconds)</label>
                <input type="number" id="settingDelay" min="0.1" step="0.1">
            </div>
            
            <div class="form-group">
                <label>Rate Limit (seconds)</label>
                <input type="number" id="settingRateLimit" min="1" step="1">
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; margin-bottom: 1rem;">
                    <input type="checkbox" id="settingUseProxies" style="width: auto; margin-right: 0.5rem;">
                    Use Proxies
                </label>
                
                <label style="display: flex; align-items: center; margin-bottom: 1rem;">
                    <input type="checkbox" id="settingUseVPN" style="width: auto; margin-right: 0.5rem;">
                    Use VPN
                </label>
                
                <label style="display: flex; align-items: center; margin-bottom: 1rem;">
                    <input type="checkbox" id="settingLogHits" style="width: auto; margin-right: 0.5rem;">
                    Log Hits to File
                </label>
            </div>
            
            <button class="btn btn-primary" onclick="saveSettings()" style="width: 100%;">Save Settings</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        let currentUsernames = [];
        let statusInterval;

        // ==================== INITIALIZATION ====================

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAccounts();
            await loadHits();
            await loadSettings();
            startStatusPolling();
        });

        // ==================== ACCOUNT MANAGEMENT ====================

        async function loadAccounts() {
            try {
                const res = await fetch(`${API}/accounts`);
                const accounts = await res.json();
                
                const accountsList = document.getElementById('accountsList');
                const checkboxesContainer = document.getElementById('accountsCheckboxes');
                
                accountsList.innerHTML = '';
                checkboxesContainer.innerHTML = '';
                
                Object.entries(accounts).forEach(([id, acc]) => {
                    // Account item
                    const item = document.createElement('div');
                    item.className = 'account-item';
                    item.innerHTML = `
                        <div class="account-info">
                            <div class="account-username">${acc.username}</div>
                            <div class="account-status">
                                <span class="status-badge ${acc.status === 'online' ? 'status-online' : 'status-offline'}">
                                    ${acc.status}
                                </span>
                                • Checks: ${acc.checks_count || 0}
                            </div>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-success btn-sm" onclick="loginAccount('${id}')">Login</button>
                            <button class="btn btn-danger btn-sm" onclick="removeAccount('${id}')">✕</button>
                        </div>
                    `;
                    accountsList.appendChild(item);
                    
                    // Checkbox for selection
                    const checkbox = document.createElement('label');
                    checkbox.style.display = 'flex';
                    checkbox.style.alignItems = 'center';
                    checkbox.style.marginBottom = '0.5rem';
                    checkbox.innerHTML = `
                        <input type="checkbox" value="${id}" class="account-checkbox" style="width: auto; margin-right: 0.5rem;">
                        ${acc.username}
                    `;
                    checkboxesContainer.appendChild(checkbox);
                });
            } catch (e) {
                console.error('Error loading accounts:', e);
            }
        }

        async function addAccount() {
            const username = document.getElementById('accountUsername').value;
            const password = document.getElementById('accountPassword').value;
            
            if (!username || !password) {
                alert('Enter both username and password');
                return;
            }
            
            try {
                await fetch(`${API}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                closeAddAccountModal();
                await loadAccounts();
            } catch (e) {
                alert('Error adding account: ' + e);
            }
        }

        async function removeAccount(id) {
            if (!confirm('Remove this account?')) return;
            
            try {
                await fetch(`${API}/accounts/${id}`, { method: 'DELETE' });
                await loadAccounts();
            } catch (e) {
                alert('Error removing account: ' + e);
            }
        }

        async function loginAccount(id) {
            try {
                const res = await fetch(`${API}/accounts/${id}/login`, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Login successful!');
                    await loadAccounts();
                } else {
                    alert('❌ Login failed: ' + data.message);
                }
            } catch (e) {
                alert('Error: ' + e);
            }
        }

        async function showLoginAll() {
            const checkboxes = document.querySelectorAll('.account-checkbox');
            let loggedIn = 0;
            
            for (const checkbox of checkboxes) {
                if (checkbox.checked) {
                    try {
                        await loginAccount(checkbox.value);
                        loggedIn++;
                        await new Promise(r => setTimeout(r, 500));
                    } catch (e) {
                        console.error(e);
                    }
                }
            }
            
            alert(`Logged in ${loggedIn} accounts`);
        }

        // ==================== GENERATOR ====================

        async function generateRandom() {
            const count = parseInt(document.getElementById('randomCount').value) || 10;
            const maxLength = parseInt(document.getElementById('randomMaxLength').value) || 5;
            
            try {
                const res = await fetch(`${API}/generator/random`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count, max_length: maxLength })
                });
                const data = await res.json();
                displayUsernames(data.usernames);
            } catch (e) {
                alert('Error generating: ' + e);
            }
        }

        async function generatePattern() {
            const base = document.getElementById('patternBase').value;
            const count = parseInt(document.getElementById('patternCount').value) || 10;
            
            if (!base) {
                alert('Enter a base username');
                return;
            }
            
            try {
                const res = await fetch(`${API}/generator/pattern`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base, count })
                });
                const data = await res.json();
                displayUsernames(data.usernames);
            } catch (e) {
                alert('Error generating: ' + e);
            }
        }

        async function loadWordlist() {
            const filepath = document.getElementById('wordlistPath').value;
            
            if (!filepath) {
                alert('Enter a file path');
                return;
            }
            
            try {
                const res = await fetch(`${API}/generator/wordlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filepath })
                });
                const data = await res.json();
                displayUsernames(data.usernames);
            } catch (e) {
                alert('Error loading: ' + e);
            }
        }

        function displayUsernames(usernames) {
            currentUsernames = usernames;
            const container = document.getElementById('usernameListContainer');
            const list = document.getElementById('usernameList');
            
            list.innerHTML = usernames.map(u => `<div class="username-item">${u}</div>`).join('');
            document.getElementById('usernameCount').textContent = `${usernames.length} usernames`;
            container.style.display = 'block';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // ==================== CHECKER ====================

        async function startChecking() {
            let usernames = currentUsernames;
            
            if (!usernames.length) {
                const manual = document.getElementById('manualUsernames').value;
                usernames = manual.split('\n').map(u => u.trim()).filter(u => u);
            }
            
            if (!usernames.length) {
                alert('No usernames to check');
                return;
            }
            
            const accountIds = Array.from(document.querySelectorAll('.account-checkbox:checked'))
                .map(c => c.value);
            
            if (!accountIds.length) {
                alert('Select at least one account');
                return;
            }
            
            try {
                await fetch(`${API}/checker/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames, account_ids: accountIds })
                });
                
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('progressContainer').style.display = 'block';
                document.getElementById('resultsContainer').style.display = 'none';
                
                document.getElementById('totalCount').textContent = usernames.length;
                
                startProgressPolling();
            } catch (e) {
                alert('Error starting check: ' + e);
            }
        }

        async function stopChecking() {
            try {
                await fetch(`${API}/checker/stop`, { method: 'POST' });
                stopProgressPolling();
            } catch (e) {
                alert('Error stopping: ' + e);
            }
        }

        async function startProgressPolling() {
            statusInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API}/checker/status`);
                    const status = await res.json();
                    
                    document.getElementById('progressFill').style.width = status.progress + '%';
                    document.getElementById('progressText').textContent = status.progress + '%';
                    document.getElementById('currentIndex').textContent = status.current_idx;
                    
                    document.getElementById('resultAvailable').textContent = status.results.available.length;
                    document.getElementById('resultTaken').textContent = status.results.taken.length;
                    
                    if (!status.active) {
                        stopProgressPolling();
                        document.getElementById('progressContainer').style.display = 'none';
                        document.getElementById('resultsContainer').style.display = 'block';
                        document.getElementById('startBtn').style.display = 'block';
                        await loadHits();
                    }
                } catch (e) {
                    console.error('Polling error:', e);
                }
            }, 500);
        }

        function stopProgressPolling() {
            clearInterval(statusInterval);
        }

        // ==================== HITS ====================

        async function loadHits() {
            try {
                const res = await fetch(`${API}/hits`);
                const hits = await res.json();
                
                const hitsList = document.getElementById('hitsList');
                hitsList.innerHTML = '';
                
                if (hits.length === 0) {
                    hitsList.innerHTML = '<p style="text-align: center; color: rgba(248,249,250,0.4);">No hits yet</p>';
                    return;
                }
                
                hits.slice(0, 50).forEach(hit => {
                    const item = document.createElement('div');
                    item.className = 'hits-item';
                    item.innerHTML = `
                        <div>
                            <div class="hits-username">${hit.username}</div>
                            <div class="hits-time">${new Date(hit.timestamp).toLocaleString()}</div>
                        </div>
                        <button class="btn btn-danger btn-sm" onclick="removeHit('${hit.username}')">✕</button>
                    `;
                    hitsList.appendChild(item);
                });
                
                if (hits.length > 50) {
                    const more = document.createElement('p');
                    more.style.textAlign = 'center';
                    more.style.color = 'rgba(248,249,250,0.4)';
                    more.textContent = `... and ${hits.length - 50} more`;
                    hitsList.appendChild(more);
                }
            } catch (e) {
                console.error('Error loading hits:', e);
            }
        }

        async function removeHit(username) {
            try {
                await fetch(`${API}/hits/${username}`, { method: 'DELETE' });
                await loadHits();
            } catch (e) {
                alert('Error removing hit: ' + e);
            }
        }

        async function exportHits() {
            try {
                const res = await fetch(`${API}/hits/export`);
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `hits_${new Date().getTime()}.txt`;
                a.click();
            } catch (e) {
                alert('Error exporting: ' + e);
            }
        }

        // ==================== SETTINGS ====================

        async function loadSettings() {
            try {
                const res = await fetch(`${API}/settings`);
                const settings = await res.json();
                
                document.getElementById('settingDelay').value = settings.check_delay;
                document.getElementById('settingRateLimit').value = settings.rate_limit;
                document.getElementById('settingUseProxies').checked = settings.use_proxies;
                document.getElementById('settingUseVPN').checked = settings.use_vpn;
                document.getElementById('settingLogHits').checked = settings.log_hits;
            } catch (e) {
                console.error('Error loading settings:', e);
            }
        }

        async function saveSettings() {
            const settings = {
                check_delay: parseFloat(document.getElementById('settingDelay').value),
                rate_limit: parseInt(document.getElementById('settingRateLimit').value),
                use_proxies: document.getElementById('settingUseProxies').checked,
                use_vpn: document.getElementById('settingUseVPN').checked,
                log_hits: document.getElementById('settingLogHits').checked
            };
            
            try {
                await fetch(`${API}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                closeSettingsModal();
                alert('✅ Settings saved!');
            } catch (e) {
                alert('Error saving settings: ' + e);
            }
        }

        // ==================== MODALS ====================

        function openAddAccountModal() {
            document.getElementById('addAccountModal').classList.add('active');
        }

        function closeAddAccountModal() {
            document.getElementById('addAccountModal').classList.remove('active');
            document.getElementById('accountUsername').value = '';
            document.getElementById('accountPassword').value = '';
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // ==================== STATUS POLLING ====================

        function startStatusPolling() {
            setInterval(loadAccounts, 5000);
        }
    </script>
</body>
</html>
